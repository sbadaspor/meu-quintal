<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meu Quintal</title>
  <script src="https://cdn.tailwindcss.com/3.4.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #f0fdf4; }

    /* Colheita pronta */
    .ready-to-harvest { animation: pulse-green 2s infinite; }
    @keyframes pulse-green {
      0%, 100% { background-color: #dcfce7; }
      50%       { background-color: #bbf7d0; }
    }

    /* Necessita rega */
    .needs-water {
      border-color: #fca5a5 !important;
      background-color: #fff7f7;
    }
    .needs-water-pulse {
      animation: pulse-red 2.5s infinite;
    }
    @keyframes pulse-red {
      0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.15); }
      50%       { box-shadow: 0 0 0 6px rgba(239,68,68,0.0); }
    }

    /* Regada recentemente */
    .recently-watered {
      border-color: #6ee7b7 !important;
    }

    /* Modal */
    #editModal { display: none; }
    #editModal.active { display: flex; }

    /* Botão rega mobile-friendly */
    .btn-rega {
      min-width: 48px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      font-size: 1.25rem;
      transition: transform 0.15s, background 0.15s;
      cursor: pointer;
      border: none;
    }
    .btn-rega:active { transform: scale(0.92); }
  </style>
</head>
<body class="min-h-screen p-4 font-sans">

<!-- LOGIN -->
<div id="loginScreen" class="fixed inset-0 bg-green-50 flex items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-sm mx-4 text-center">
    <div class="text-6xl mb-4">&#128274;</div>
    <h1 class="text-2xl font-bold text-green-800 mb-1">Meu Quintal</h1>
    <p class="text-green-600 text-sm mb-6">Insere a password para entrar</p>
    <input type="password" id="passwordInput"
      class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-green-400 text-center mb-3"
      placeholder="Password" />
    <div id="erroLogin" class="hidden text-red-600 text-sm font-semibold mb-3">Acesso Negado</div>
    <button type="button" id="loginBtn"
      class="w-full bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl py-4 text-base transition-colors">
      Entrar
    </button>
  </div>
</div>

<!-- MODAL DE EDIÇÃO -->
<div id="editModal" class="fixed inset-0 bg-black bg-opacity-40 items-center justify-center z-50">
  <div class="bg-white rounded-2xl shadow-xl p-6 w-full max-w-sm mx-4">
    <h2 class="text-lg font-semibold text-green-700 mb-4">Editar Planta</h2>
    <div class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Planta</label>
        <input type="text" id="edit_nome"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
        <select id="edit_tipo"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="Legumes">Legumes</option>
          <option value="Frutas">Frutas</option>
          <option value="Ervas">Ervas</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Local de plantação</label>
        <input type="text" id="edit_zona"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Data da plantação</label>
          <input type="date" id="edit_data_plantio"
            class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Dias até dar fruto</label>
          <input type="number" id="edit_dias_colheita" min="1"
            class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
            placeholder="Opcional" />
        </div>
      </div>
    </div>
    <div class="flex gap-2 mt-5">
      <button id="editSaveBtn"
        class="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl py-2.5 text-sm transition-colors">
        Guardar
      </button>
      <button id="editCancelBtn"
        class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold rounded-xl py-2.5 text-sm transition-colors">
        Cancelar
      </button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="appContent" class="hidden max-w-lg mx-auto">
  <div class="text-center mb-6">
    <h1 class="text-3xl font-bold text-green-800">Meu Quintal</h1>
    <p class="text-green-600 text-sm mt-1">Gestão de plantas e colheitas</p>
  </div>

  <!-- FORMULÁRIO -->
  <div class="bg-white rounded-2xl shadow-md p-5 mb-6">
    <h2 class="text-lg font-semibold text-green-700 mb-4">Adicionar Planta</h2>
    <form id="plantForm" class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Nome da Planta</label>
        <input type="text" id="nome" required
          class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
          placeholder="Ex: Tomate Cherry" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tipo</label>
        <select id="tipo"
          class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="Legumes">Legumes</option>
          <option value="Frutas">Frutas</option>
          <option value="Ervas">Ervas</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Local de plantação</label>
        <input type="text" id="zona" required
          class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
          placeholder="Ex: Canteiro Norte" />
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Data da plantação</label>
          <input type="date" id="data_plantio" required
            class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Dias até dar fruto</label>
          <input type="number" id="dias_colheita" min="1"
            class="w-full border border-gray-300 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-400"
            placeholder="Ex: 60 (opcional)" />
        </div>
      </div>
      <button type="submit"
        class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold rounded-xl py-2.5 text-sm transition-colors mt-2">
        Adicionar Planta
      </button>
    </form>
  </div>

  <!-- LISTA DE PLANTAS ATIVAS -->
  <div>
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-semibold text-green-700">As Minhas Plantas</h2>
      <select id="filtroTipo"
        class="border border-gray-300 rounded-xl px-3 py-1.5 text-sm text-gray-700 bg-white focus:outline-none focus:ring-2 focus:ring-green-400 cursor-pointer">
        <option value="Todas">Todas</option>
        <option value="Legumes">Legumes</option>
        <option value="Frutas">Frutas</option>
        <option value="Ervas">Ervas</option>
      </select>
    </div>
    <div id="loading" class="hidden text-center text-gray-400 text-sm py-8">A carregar...</div>
    <div id="plantList" class="space-y-3"></div>
    <div id="emptyState" class="hidden text-center text-gray-400 text-sm py-8">Ainda não tens plantas registadas.</div>
    <div id="emptyFilter" class="hidden text-center text-gray-400 text-sm py-8">Nenhuma planta nesta categoria.</div>
  </div>

  <!-- ARQUIVO DE COLHEITAS -->
  <div class="mt-8 mb-6">
    <button id="toggleArquivo"
      class="w-full flex items-center justify-between bg-amber-50 hover:bg-amber-100 border border-amber-200 rounded-2xl px-5 py-3 transition-colors">
      <div class="flex items-center gap-2">
        <span class="text-xl">&#127807;</span>
        <span class="text-base font-semibold text-amber-800">Arquivo de Colheitas</span>
        <span id="arquivoBadge" class="bg-amber-200 text-amber-800 text-xs font-bold px-2 py-0.5 rounded-full">0</span>
      </div>
      <span id="arquivoChevron" class="text-amber-600 text-lg transition-transform">&#9660;</span>
    </button>
    <div id="arquivoContent" class="hidden mt-3">
      <div id="arquivoLoading" class="hidden text-center text-gray-400 text-sm py-4">A carregar...</div>
      <div id="arquivoList" class="space-y-2"></div>
      <div id="arquivoEmpty" class="hidden text-center text-gray-400 text-sm py-6">Ainda não tens colheitas registadas.</div>
    </div>
  </div>

</div><!-- fim appContent -->

<script>
window.addEventListener('load', function () {

  // ---- LOGIN ----
  function verificarPassword() {
    var pw = document.getElementById('passwordInput').value;
    if (pw === 'mindelo') {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('appContent').classList.remove('hidden');
      iniciarApp();
    } else {
      document.getElementById('passwordInput').value = '';
      document.getElementById('erroLogin').classList.remove('hidden');
      document.getElementById('passwordInput').focus();
    }
  }
  document.getElementById('loginBtn').addEventListener('click', verificarPassword);
  document.getElementById('passwordInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') verificarPassword();
  });

  // ---- SUPABASE ----
  var SUPABASE_URL  = 'https://gfmibkhgrdgcrgshqrgc.supabase.co';
  var SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdmbWlia2hncmRnY3Jnc2hxcmdjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MzM5MDAsImV4cCI6MjA5MDUwOTkwMH0.NNF-K6HYE8wQKTI5WrXiuAK15EZ6fYiWIOxSx4cyDTk';
  var db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // ---- CACHES ----
  var todasAsPlantas = [];
  var arquivoAberto  = false;

  // ---- AUXILIARES ----
  function calcDC(dp, dc) {
    var d = new Date(dp);
    d.setDate(d.getDate() + parseInt(dc));
    return d;
  }
  function fmt(s) {
    var d = new Date(s + 'T00:00:00');
    return d.toLocaleDateString('pt-PT', { day:'2-digit', month:'2-digit', year:'numeric' });
  }
  function diasPassados(dp) {
    var hoje = new Date(); hoje.setHours(0,0,0,0);
    var plantado = new Date(dp + 'T00:00:00');
    var diff = Math.floor((hoje - plantado) / 86400000);
    if (diff === 0) return 'hoje';
    if (diff === 1) return 'há 1 dia';
    return 'há ' + diff + ' dias';
  }
  function pronta(dc) {
    var h = new Date(); h.setHours(0,0,0,0); return dc <= h;
  }
  function dr(dc) {
    var h = new Date(); h.setHours(0,0,0,0);
    return Math.ceil((dc - h) / 86400000);
  }
  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function dataHoje() {
    var d = new Date();
    return d.getFullYear() + '-' +
      String(d.getMonth()+1).padStart(2,'0') + '-' +
      String(d.getDate()).padStart(2,'0');
  }

  // ---- LÓGICA DE REGA ----
  // Devolve: 'never' | 'needs' (>48h) | 'ok' (<=48h)
  function estadoRega(ultimaRega) {
    if (!ultimaRega) return 'never';
    var agora = Date.now();
    var regaTs = new Date(ultimaRega).getTime();
    var horas = (agora - regaTs) / 3600000;
    return horas > 48 ? 'needs' : 'ok';
  }
  function textoRega(ultimaRega) {
    if (!ultimaRega) return 'Sem registo de rega';
    var agora = Date.now();
    var regaTs = new Date(ultimaRega).getTime();
    var horas = Math.floor((agora - regaTs) / 3600000);
    if (horas < 1) return 'Regada há menos de 1h';
    if (horas < 24) return 'Regada há ' + horas + 'h';
    var dias = Math.floor(horas / 24);
    if (dias === 1) return 'Regada há 1 dia';
    return 'Regada há ' + dias + ' dias';
  }

  var tipoCores = {
    'Legumes':'bg-green-100 text-green-700',
    'Frutas':'bg-yellow-100 text-yellow-700',
    'Ervas':'bg-teal-100 text-teal-700'
  };
  function tipoBadge(tipo) {
    if (!tipo) return '';
    var cls = tipoCores[tipo] || 'bg-gray-100 text-gray-600';
    return '<span class="text-xs font-medium px-2 py-0.5 rounded-full ' + cls + '">' + esc(tipo) + '<\/span>';
  }

  // ---- RENDER CARTÃO ----
  function render(p) {
    var temDias = p.dias_colheita !== null && p.dias_colheita !== undefined && p.dias_colheita !== '';
    var badge, colheitaStr;
    if (temDias) {
      var dc = calcDC(p.data_plantio, p.dias_colheita);
      var pr = pronta(dc); var d = dr(dc);
      badge = pr
        ? '<span class="bg-green-500 text-white text-xs font-bold px-2 py-1 rounded-full">Pronto a Colher!<\/span>'
        : '<span class="bg-amber-100 text-amber-700 text-xs px-2 py-1 rounded-full">' + d + ' dias<\/span>';
      colheitaStr = fmt(dc.toISOString().split('T')[0]);
    } else {
      badge = '<span class="bg-gray-100 text-gray-500 text-xs px-2 py-1 rounded-full">S\/ data<\/span>';
      colheitaStr = '---';
    }

    var isReady   = temDias && pronta(calcDC(p.data_plantio, p.dias_colheita));
    var diasStr   = diasPassados(p.data_plantio);
    var nomeEsc   = esc(p.nome).replace(/'/g, "\\'");
    var rega      = estadoRega(p.ultima_rega);
    var regaTxt   = textoRega(p.ultima_rega);

    // Classes do cartão
    var cardClass = 'rounded-2xl shadow-sm border p-4 ';
    if (isReady) {
      cardClass += 'ready-to-harvest border-green-400';
    } else if (rega === 'needs') {
      cardClass += 'needs-water needs-water-pulse border-2';
    } else if (rega === 'ok') {
      cardClass += 'bg-white recently-watered border';
    } else {
      cardClass += 'bg-white border-gray-100';
    }

    // Badge de rega
    var regaBadge;
    if (rega === 'needs') {
      regaBadge = '<span class="inline-flex items-center gap-1 bg-red-100 text-red-700 text-xs font-semibold px-2 py-0.5 rounded-full">' +
        '&#128167; Necessita de Rega!<\/span>';
    } else if (rega === 'ok') {
      regaBadge = '<span class="inline-flex items-center gap-1 bg-teal-50 text-teal-700 text-xs px-2 py-0.5 rounded-full">' +
        '&#10003; ' + regaTxt + '<\/span>';
    } else {
      regaBadge = '<span class="inline-flex items-center gap-1 bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full">' +
        '&#128167; ' + regaTxt + '<\/span>';
    }

    // Botão rega: grande e fácil de clicar no telemóvel
    var btnRegaClass = rega === 'needs'
      ? 'btn-rega bg-red-100 hover:bg-red-200 text-2xl px-3'
      : 'btn-rega bg-blue-50 hover:bg-blue-100 text-2xl px-3';

    var c = document.createElement('div');
    c.className = cardClass;
    c.innerHTML =
      '<div class="flex items-start justify-between gap-2 mb-1">' +
        '<div class="flex items-center gap-2 flex-wrap">' +
          '<h3 class="font-semibold text-gray-800">' + esc(p.nome) + '<\/h3>' +
          tipoBadge(p.tipo) + badge +
        '<\/div>' +
        // Botão 💧 grande no canto superior direito
        '<button onclick="registarRega(\'' + p.id + '\')" class="' + btnRegaClass + '" title="Registar rega agora">&#128167;<\/button>' +
      '<\/div>' +
      '<p class="text-xs text-gray-500 mb-1">' + esc(p.zona) + '<\/p>' +
      // Linha de rega
      '<div class="mb-2">' + regaBadge + '<\/div>' +
      '<div class="grid grid-cols-2 text-xs text-gray-600 gap-y-1">' +
        '<span>Plantado: ' + fmt(p.data_plantio) + ' (' + diasStr + ')<\/span>' +
        '<span>Possível colheita a partir de: ' + colheitaStr + '<\/span>' +
      '<\/div>' +
      '<div class="flex gap-2 mt-3">' +
        '<button onclick="marcarColhido(\'' + p.id + '\')" ' +
          'class="flex-1 bg-green-100 hover:bg-green-200 text-green-800 text-xs rounded-xl py-2">&#127807; Colhido<\/button>' +
        '<button onclick="editarPlanta(\'' + p.id + '\')" ' +
          'class="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs rounded-xl py-2">Editar<\/button>' +
        '<button onclick="apagar(\'' + p.id + '\',\'' + nomeEsc + '\')" ' +
          'class="flex-1 bg-red-50 hover:bg-red-100 text-red-700 text-xs rounded-xl py-2">Apagar<\/button>' +
      '<\/div>';
    return c;
  }

  // ---- FILTRAR E MOSTRAR ----
  function aplicarFiltro() {
    var filtro = document.getElementById('filtroTipo').value;
    var lista  = filtro === 'Todas'
      ? todasAsPlantas
      : todasAsPlantas.filter(function(p){ return p.tipo === filtro; });
    var l = document.getElementById('plantList');
    l.innerHTML = '';
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('emptyFilter').classList.add('hidden');
    if (todasAsPlantas.length === 0) {
      document.getElementById('emptyState').classList.remove('hidden'); return;
    }
    if (lista.length === 0) {
      document.getElementById('emptyFilter').classList.remove('hidden'); return;
    }
    lista.forEach(function(p){ l.appendChild(render(p)); });
  }

  // ---- LOAD ----
  async function load() {
    document.getElementById('loading').classList.remove('hidden');
    document.getElementById('plantList').innerHTML = '';
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('emptyFilter').classList.add('hidden');
    const { data, error } = await db
      .from('plantas').select('*').order('data_plantio', { ascending: false });
    document.getElementById('loading').classList.add('hidden');
    if (error) {
      document.getElementById('plantList').innerHTML =
        '<div class="text-red-500 text-sm py-4">Erro: ' + error.message + '<\/div>'; return;
    }
    todasAsPlantas = data || [];
    aplicarFiltro();
  }

  // ---- REGISTAR REGA ----
  window.registarRega = async function(id) {
    // Feedback visual imediato no botão
    var btn = document.querySelector('button[onclick="registarRega(\'' + id + '\')"]');
    if (btn) { btn.textContent = '✓'; btn.disabled = true; }

    var agora = new Date().toISOString();
    const { error } = await db.from('plantas').update({ ultima_rega: agora }).eq('id', id);

    if (error) {
      alert('Erro ao registar rega: ' + error.message);
      if (btn) { btn.textContent = '💧'; btn.disabled = false; }
      return;
    }
    // Actualizar cache local e re-renderizar sem reload completo
    var idx = todasAsPlantas.findIndex(function(x){ return String(x.id) === String(id); });
    if (idx !== -1) todasAsPlantas[idx].ultima_rega = agora;
    aplicarFiltro();
  };

  // ---- LOAD ARQUIVO ----
  async function loadArquivo() {
    document.getElementById('arquivoLoading').classList.remove('hidden');
    document.getElementById('arquivoList').innerHTML = '';
    document.getElementById('arquivoEmpty').classList.add('hidden');
    const { data, error } = await db
      .from('historico').select('*').order('data_colheita', { ascending: false });
    document.getElementById('arquivoLoading').classList.add('hidden');
    if (error) {
      document.getElementById('arquivoList').innerHTML =
        '<div class="text-red-500 text-sm py-4">Erro: ' + error.message + '<\/div>'; return;
    }
    var registos = data || [];
    document.getElementById('arquivoBadge').textContent = registos.length;
    if (registos.length === 0) {
      document.getElementById('arquivoEmpty').classList.remove('hidden'); return;
    }
    var l = document.getElementById('arquivoList');
    registos.forEach(function(h) {
      var row = document.createElement('div');
      row.className = 'bg-white border border-amber-100 rounded-xl px-4 py-3 flex items-center justify-between';
      row.innerHTML =
        '<div class="flex items-center gap-2">' +
          '<span class="text-lg">&#127807;<\/span>' +
          '<div>' +
            '<p class="text-sm font-semibold text-gray-800">' + esc(h.nome) + '<\/p>' +
            '<p class="text-xs text-gray-500">' + (h.tipo || '') + '<\/p>' +
          '<\/div>' +
        '<\/div>' +
        '<span class="text-xs text-amber-700 font-medium bg-amber-50 px-2 py-1 rounded-lg">Colhido em ' + fmt(h.data_colheita) + '<\/span>';
      l.appendChild(row);
    });
  }

  // ---- MARCAR COLHIDO ----
  window.marcarColhido = async function(id) {
    var p = todasAsPlantas.find(function(x){ return String(x.id) === String(id); });
    if (!p) return;
    if (!confirm('Marcar "' + p.nome + '" como colhida? A planta será movida para o Arquivo de Colheitas.')) return;
    var registo = {
      nome: p.nome, tipo: p.tipo || null,
      zona: p.zona || null, data_plantio: p.data_plantio || null,
      data_colheita: dataHoje()
    };
    const { error: errIns } = await db.from('historico').insert([registo]);
    if (errIns) { alert('Erro ao guardar no histórico: ' + errIns.message); return; }
    const { error: errDel } = await db.from('plantas').delete().eq('id', id);
    if (errDel) { alert('Erro ao remover a planta: ' + errDel.message); return; }
    load();
    if (arquivoAberto) loadArquivo();
    else {
      db.from('historico').select('id', { count:'exact', head:true }).then(function(res){
        if (!res.error) document.getElementById('arquivoBadge').textContent = res.count || 0;
      });
    }
  };

  // ---- EDITAR PLANTA ----
  window.editarPlanta = function(id) {
    var p = todasAsPlantas.find(function(x){ return String(x.id) === String(id); });
    if (!p) return;
    document.getElementById('edit_nome').value          = p.nome || '';
    document.getElementById('edit_tipo').value          = p.tipo || 'Legumes';
    document.getElementById('edit_zona').value          = p.zona || '';
    document.getElementById('edit_data_plantio').value  = p.data_plantio || '';
    document.getElementById('edit_dias_colheita').value = (p.dias_colheita !== null && p.dias_colheita !== undefined) ? p.dias_colheita : '';
    var modal = document.getElementById('editModal');
    modal.classList.add('active');
    document.getElementById('editSaveBtn').onclick = async function() {
      var btn = document.getElementById('editSaveBtn');
      btn.disabled = true; btn.textContent = 'A guardar...';
      var diasVal = document.getElementById('edit_dias_colheita').value.trim();
      var updates = {
        nome:          document.getElementById('edit_nome').value.trim(),
        tipo:          document.getElementById('edit_tipo').value,
        zona:          document.getElementById('edit_zona').value.trim(),
        data_plantio:  document.getElementById('edit_data_plantio').value,
        dias_colheita: diasVal !== '' ? parseInt(diasVal) : null
      };
      const { error } = await db.from('plantas').update(updates).eq('id', id);
      btn.disabled = false; btn.textContent = 'Guardar';
      if (error) { alert('Erro ao guardar: ' + error.message); return; }
      modal.classList.remove('active');
      load();
    };
    document.getElementById('editCancelBtn').onclick = function() {
      modal.classList.remove('active');
    };
  };

  // ---- APAGAR ----
  window.apagar = async function(id, nome) {
    if (!confirm('Apagar "' + nome + '"? Esta ação não pode ser desfeita.')) return;
    const { error } = await db.from('plantas').delete().eq('id', id);
    if (error) { alert('Erro: ' + error.message); return; }
    load();
  };

  // ---- INICIAR APP ----
  function iniciarApp() {
    document.getElementById('filtroTipo').addEventListener('change', aplicarFiltro);

    document.getElementById('toggleArquivo').addEventListener('click', function() {
      arquivoAberto = !arquivoAberto;
      var content = document.getElementById('arquivoContent');
      var chevron = document.getElementById('arquivoChevron');
      if (arquivoAberto) {
        content.classList.remove('hidden');
        chevron.style.transform = 'rotate(180deg)';
        loadArquivo();
      } else {
        content.classList.add('hidden');
        chevron.style.transform = 'rotate(0deg)';
      }
    });

    db.from('historico').select('id', { count:'exact', head:true }).then(function(res){
      if (!res.error) document.getElementById('arquivoBadge').textContent = res.count || 0;
    });

    document.getElementById('plantForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      var btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'A guardar...';
      var diasVal = document.getElementById('dias_colheita').value.trim();
      var n = {
        nome:          document.getElementById('nome').value.trim(),
        tipo:          document.getElementById('tipo').value,
        zona:          document.getElementById('zona').value.trim(),
        data_plantio:  document.getElementById('data_plantio').value,
        dias_colheita: diasVal !== '' ? parseInt(diasVal) : null
      };
      const { error } = await db.from('plantas').insert([n]);
      btn.disabled = false; btn.textContent = 'Adicionar Planta';
      if (error) { alert('Erro: ' + error.message); return; }
      e.target.reset();
      load();
    });

    load();
  }

});
</script>
</body>
</html>
